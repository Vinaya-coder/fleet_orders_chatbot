domain_context:
  description: |
    Fleet document processing pipeline tracking orders from email/API endpoints → 
    OCR/LLM extraction → order creation → human validation → fleet dispatch.
    
    KEY METRICS:
    - Token consumption: input_tokens + output_tokens (llm_usage_logs)
    - Processing latency: upload.created_at → order.updated_at  
    - Extraction accuracy: COUNT(extracted_data_revisions) per document_order_id

database_relationships:
  email_to_upload: "email_requests.id = document_uploads.email_ref_id"
  upload_to_order: "document_uploads.id = document_orders.document_upload_id"
  upload_to_llm: "document_uploads.id = llm_usage_logs.document_upload_id"
  order_to_revision: "document_orders.id = extracted_data_revisions.document_order_id"

kpi_definitions:
  total_consumption: "SUM(llm_usage_logs.input_tokens + llm_usage_logs.output_tokens)"
  processing_latency: "document_orders.updated_at - document_uploads.created_at"
  extraction_accuracy: "COUNT(extracted_data_revisions) > 1 per document_order_id = human corrected"
  multi_order_rate: "document_orders.order_type = 'multi'"
  failure_rate: "COUNT(*) WHERE failure_reason IS NOT NULL"

sql_rules:
  critical:
    - "NEVER use SELECT * - specify exact columns"
    - "Always use LIMIT 100 maximum for examples"
    - "Prefer GROUP BY / COUNT / AVG / SUM for analytics"
    - "JOIN using EXACT relationships above"
  json_access:
    - "extracted_data_revisions.extracted_info ->> 'field_name'"
    - "email_requests.attachments ->> 'filename'"
  time_filters:
    - "ONLY add date filters if the user explicitly asks for a time period (e.g., 'last 7 days', 'this month', 'since January')"
    - "If no time period is mentioned, do NOT add any date filtering"
    - "When time period IS specified: WHERE created_at >= (NOW() AT TIME ZONE 'UTC' - INTERVAL '...')"
  validation:
    - "After query, check COUNT(*) > 0 before answering"
    - "If no results: 'No data matches criteria. Try broader time range.'"

table_business_meaning:
  document_uploads: "Raw files from email/API (PDFs, Excel, images)"
  document_orders: "Final fleet orders created from documents"
  email_requests: "Incoming carrier/shipper emails with attachments"
  extracted_data_revisions: "AI extraction + human corrections (JSON)"
  llm_usage_logs: "Token costs and performance per document"
